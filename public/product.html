<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Stryde</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    body { overflow: auto; }

    main {
      padding: 80px 24px 60px;
      max-width: 900px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 32px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--accent); }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .product-visual {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      aspect-ratio: 1;
    }

    .product-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-visual .emoji-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    #threeCanvas {
      width: 100% !important;
      height: 100% !important;
      display: none;
    }

    .view-toggle {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    .view-btn {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn.active {
      background: var(--accent);
      color: white;
    }

    .view-btn:not(.active) {
      background: rgba(255,255,255,0.85);
      color: var(--ink);
    }

    .model-hint {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,0.85);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      display: none;
    }

    .product-details {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .product-category-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 600;
    }

    .product-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
    }

    .product-price-tag {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
    }

    .product-description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.8;
    }

    .detail-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
    }

    .color-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-dot {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--ink);
      background: var(--white);
    }

    .size-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .size-chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink);
      background: var(--white);
    }

    .stock-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .stock-badge.in-stock { color: #2d6a4f; }
    .stock-badge.out-of-stock { color: #e63946; }

    .stock-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .in-stock .stock-dot { background: #2d6a4f; }
    .out-of-stock .stock-dot { background: #e63946; }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-primary {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--ink); }

    .btn-secondary {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 24px;
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .no-model-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      padding: 6px 12px;
      border-radius: 20px;
    }

    @media (max-width: 640px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Stryde</div>
    <nav class="header-nav">
      <a href="browse.html">Browse</a>
    </nav>
  </header>

  <main>
    <a class="back-btn" onclick="history.back()">← Back</a>
    <div class="product-layout" id="productLayout"></div>
  </main>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    let renderer, scene, camera, controls;

    async function loadProduct() {
      const response = await fetch('/products');
      const products = await response.json();
      const product = products.find(p => p.id === parseInt(productId));

      if (!product) {
        document.getElementById('productLayout').innerHTML = '<p>Product not found.</p>';
        return;
      }

      document.title = `${product.name} — Stryde`;

      const price = product.price ? product.price.replace(/\?/g, '₹') : '';
      const colors = product.color ? product.color.split(',').map(c => c.trim()) : [];
      const sizes = product.size ? product.size.split(',').map(s => s.trim()) : [];
      const has3D = !!product.model_url;

      document.getElementById('productLayout').innerHTML = `
        <div class="product-visual" id="productVisual">
          ${product.image_url
            ? `<img src="${product.image_url}" alt="${product.name}" id="productImage" />`
            : `<div class="emoji-placeholder">${product.icon || '📦'}</div>`
          }
          <canvas id="threeCanvas"></canvas>
          <div class="model-hint" id="modelHint">🖱 Drag to rotate · Scroll to zoom</div>
          ${has3D ? `
            <div class="view-toggle">
              <button class="view-btn active" id="btnImage" onclick="switchView('image')">Photo</button>
              <button class="view-btn" id="btn3D" onclick="switchView('3d')">3D View</button>
            </div>
          ` : ''}
        </div>

        <div class="product-details">
          <div>
            <div class="product-category-tag">${product.subcategory || product.category}</div>
            <div class="product-title">${product.name}</div>
          </div>

          <div class="product-price-tag">${price}</div>

          <div class="divider"></div>

          <div class="product-description">${product.description}</div>

          <div class="divider"></div>

          ${colors.length > 0 ? `
            <div class="detail-section">
              <div class="detail-label">Available Colors</div>
              <div class="color-dots">
                ${colors.map(c => `<span class="color-dot">${c}</span>`).join('')}
              </div>
            </div>
          ` : ''}

          ${sizes.length > 0 ? `
            <div class="detail-section">
              <div class="detail-label">Available Sizes</div>
              <div class="size-chips">
                ${sizes.map(s => `<span class="size-chip">${s}</span>`).join('')}
              </div>
            </div>
          ` : ''}

          <div class="detail-section">
            <div class="detail-label">Availability</div>
            <div class="stock-badge ${product.stock > 0 ? 'in-stock' : 'out-of-stock'}">
              <div class="stock-dot"></div>
              ${product.stock > 0 ? `${product.stock} in stock` : 'Out of stock'}
            </div>
          </div>

          ${!has3D ? `
            <div class="no-model-badge">
              📦 3D model not available yet
            </div>
          ` : ''}

          <div class="action-buttons">
            <button class="btn-primary" onclick="askSam('${product.name}')">
              👟 Ask Sam about this
            </button>
            <button class="btn-secondary" onclick="window.location.href='browse.html'">
              Browse more products
            </button>
          </div>
        </div>
      `;

      if (has3D) {
        init3DViewer(product.model_url);
      }
    }

    function init3DViewer(modelUrl) {
      const canvas = document.getElementById('threeCanvas');
      const visual = document.getElementById('productVisual');

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(visual.clientWidth, visual.clientHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf2f2f2);

      camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.set(0, 1, 3);

      controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 1.5;

      const ambient = new THREE.AmbientLight(0xffffff, 1.2);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 2);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
      fillLight.position.set(-5, 0, -5);
      scene.add(fillLight);

      const loader = new GLTFLoader();
      loader.load(modelUrl, (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        model.position.sub(center);
        model.scale.setScalar(scale);
        scene.add(model);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    }

    window.switchView = function(view) {
      const image = document.getElementById('productImage');
      const canvas = document.getElementById('threeCanvas');
      const hint = document.getElementById('modelHint');
      const btnImage = document.getElementById('btnImage');
      const btn3D = document.getElementById('btn3D');

      if (view === '3d') {
        if (image) image.style.display = 'none';
        canvas.style.display = 'block';
        hint.style.display = 'block';
        btnImage.classList.remove('active');
        btn3D.classList.add('active');
        if (controls) controls.autoRotate = true;
      } else {
        if (image) image.style.display = 'block';
        canvas.style.display = 'none';
        hint.style.display = 'none';
        btnImage.classList.add('active');
        btn3D.classList.remove('active');
      }
    };

    window.askSam = function(productName) {
      window.location.href = `index.html?ask=${encodeURIComponent('Tell me about ' + productName)}`;
    };

    loadProduct();
  </script>

</body>
</html>
