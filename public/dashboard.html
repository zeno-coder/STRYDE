<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard — Stryde</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111111;
      --bg: #f9f9f9;
      --white: #ffffff;
      --accent: #2d6a4f;
      --accent-light: #52b788;
      --muted: #888888;
      --border: #e8e8e8;
      --surface: #f2f2f2;
      --danger: #e63946;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .login-box p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    .login-input:focus { border-color: var(--accent-light); }

    .login-error {
      font-size: 12px;
      color: var(--danger);
      margin-bottom: 10px;
      display: none;
    }

    /* DASHBOARD */
    .dashboard { display: none; }

    .dash-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .dash-logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .dash-logo span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-left: 8px;
      letter-spacing: 0;
    }

    .dash-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #1f4e37; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-small {
      font-size: 12px;
      padding: 5px 12px;
    }

    /* STATS */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--ink);
    }

    /* CONTENT */
    .dash-content {
      padding: 0 32px 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    /* TABLE */
    .products-table {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface);
    }

    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 12px 16px;
      font-weight: 600;
    }

    td {
      padding: 14px 16px;
      font-size: 13px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    .product-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface);
    }

    .product-thumb-emoji {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .stock-input {
      width: 70px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
    }

    .stock-input:focus { border-color: var(--accent-light); }

    .td-actions {
      display: flex;
      gap: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge-green {
      background: #d8f3dc;
      color: #2d6a4f;
    }

    .badge-red {
      background: #fde2e4;
      color: #e63946;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--white);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, select, textarea {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      background: var(--white);
      color: var(--ink);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-light);
    }

    textarea { resize: vertical; min-height: 80px; }

    .image-preview {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
      display: none;
      margin-top: 8px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 300;
      display: none;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Stryde Dashboard</h1>
    <p>Owner access only</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" />
    <div class="login-error" id="loginError">Wrong password. Try again.</div>
    <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="dash-header">
    <div class="dash-logo">Stryde <span>Owner Dashboard</span></div>
    <div class="dash-actions">
      <a href="index.html" target="_blank" class="btn btn-secondary">View Store</a>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="dash-content">
    <div class="section-header">
      <div class="section-title">All Products</div>
    </div>
    <div class="products-table">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Product</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Product Name</label>
        <input type="text" id="f-name" placeholder="e.g. Crocs Classic Clog" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option>Footwear</option>
          <option>Bags</option>
          <option>Accessories</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subcategory</label>
        <input type="text" id="f-subcategory" placeholder="e.g. School, Women" />
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="f-description" placeholder="Describe the product..."></textarea>
      </div>
      <div class="form-group">
        <label>Price</label>
        <input type="text" id="f-price" placeholder="e.g. ₹599 - ₹1,499" />
      </div>
      <div class="form-group">
        <label>Brand</label>
        <input type="text" id="f-brand" placeholder="e.g. Crocs, Generic" />
      </div>
      <div class="form-group">
        <label>Colors</label>
        <input type="text" id="f-color" placeholder="e.g. Black, White, Red" />
      </div>
      <div class="form-group">
        <label>Sizes</label>
        <input type="text" id="f-size" placeholder="e.g. S, M, L or UK 6-10" />
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="f-stock" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Product Image</label>
        <input type="file" id="f-image" accept="image/*" onchange="previewImage(this)" />
        <img class="image-preview" id="imagePreview" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminToken = '';
  let products = [];
  let editingId = null;

  // LOGIN
  function login() {
    const pass = document.getElementById('passwordInput').value;
    if (pass === 'pass1234') {
      adminToken = pass;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadProducts();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // LOAD PRODUCTS
  async function loadProducts() {
    const res = await fetch('/admin/products', {
      headers: { 'admin-token': adminToken }
    });
    products = await res.json();
    renderStats();
    renderTable();
  }

  // STATS
  function renderStats() {
    const total = products.length;
    const inStock = products.filter(p => p.stock > 0).length;
    const outOfStock = products.filter(p => p.stock === 0).length;
    const totalStock = products.reduce((sum, p) => sum + p.stock, 0);

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Products</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In Stock</div>
        <div class="stat-value">${inStock}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value">${outOfStock}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Units</div>
        <div class="stat-value">${totalStock}</div>
      </div>
    `;
  }

  // TABLE
  function renderTable() {
    const tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = products.map(p => `
      <tr>
        <td>
          ${p.image_url
            ? `<img src="${p.image_url}" class="product-thumb" />`
            : `<div class="product-thumb-emoji">${p.icon || '📦'}</div>`
          }
        </td>
        <td><strong>${p.name}</strong><br><span style="color:var(--muted);font-size:11px">${p.subcategory || ''}</span></td>
        <td>${p.category}</td>
        <td>${p.price ? p.price.replace(/\?/g, '₹') : '-'}</td>
        <td>
          <input
            type="number"
            class="stock-input"
            value="${p.stock}"
            min="0"
            onchange="updateStock(${p.id}, this.value)"
          />
        </td>
        <td>
          <span class="badge ${p.stock > 0 ? 'badge-green' : 'badge-red'}">
            ${p.stock > 0 ? 'In Stock' : 'Out of Stock'}
          </span>
        </td>
        <td>
          <div class="td-actions">
            <button class="btn btn-secondary btn-small" onclick="openEditModal(${p.id})">Edit</button>
            <button class="btn btn-danger btn-small" onclick="deleteProduct(${p.id})">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // UPDATE STOCK
  async function updateStock(id, stock) {
    await fetch(`/admin/products/${id}/stock`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'admin-token': adminToken },
      body: JSON.stringify({ stock: parseInt(stock) })
    });
    showToast('Stock updated!');
    loadProducts();
  }

  // DELETE
  async function deleteProduct(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    await fetch(`/admin/products/${id}`, {
      method: 'DELETE',
      headers: { 'admin-token': adminToken }
    });
    showToast('Product deleted.');
    loadProducts();
  }

  // MODAL
  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add Product';
    document.getElementById('f-name').value = '';
    document.getElementById('f-category').value = 'Footwear';
    document.getElementById('f-subcategory').value = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-brand').value = '';
    document.getElementById('f-color').value = '';
    document.getElementById('f-size').value = '';
    document.getElementById('f-stock').value = '';
    document.getElementById('f-image').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function openEditModal(id) {
    const p = products.find(p => p.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Product';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-category').value = p.category || 'Footwear';
    document.getElementById('f-subcategory').value = p.subcategory || '';
    document.getElementById('f-description').value = p.description || '';
    document.getElementById('f-price').value = p.price || '';
    document.getElementById('f-brand').value = p.brand || '';
    document.getElementById('f-color').value = p.color || '';
    document.getElementById('f-size').value = p.size || '';
    document.getElementById('f-stock').value = p.stock || 0;
    document.getElementById('f-image').value = '';
    const preview = document.getElementById('imagePreview');
    if (p.image_url) {
      preview.src = p.image_url;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function previewImage(input) {
    const preview = document.getElementById('imagePreview');
    if (input.files && input.files[0]) {
      preview.src = URL.createObjectURL(input.files[0]);
      preview.style.display = 'block';
    }
  }

  // SAVE PRODUCT
  async function saveProduct() {
    const formData = new FormData();
    formData.append('name', document.getElementById('f-name').value);
    formData.append('category', document.getElementById('f-category').value);
    formData.append('subcategory', document.getElementById('f-subcategory').value);
    formData.append('description', document.getElementById('f-description').value);
    formData.append('price', document.getElementById('f-price').value);
    formData.append('brand', document.getElementById('f-brand').value);
    formData.append('color', document.getElementById('f-color').value);
    formData.append('size', document.getElementById('f-size').value);
    formData.append('stock', document.getElementById('f-stock').value);

    const imageFile = document.getElementById('f-image').files[0];
    if (imageFile) formData.append('image', imageFile);

    if (editingId) {
      const p = products.find(p => p.id === editingId);
      formData.append('existing_image', p.image_url || '');
    }

    const url = editingId ? `/admin/products/${editingId}` : '/admin/products';
    const method = editingId ? 'PUT' : 'POST';

    await fetch(url, {
      method,
      headers: { 'admin-token': adminToken },
      body: formData
    });

    closeModal();
    showToast(editingId ? 'Product updated!' : 'Product added!');
    loadProducts();
  }

  // TOAST
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }
</script>

</body>
</html>
